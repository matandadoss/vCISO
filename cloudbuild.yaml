steps:
  # 1. Pull backend cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/vciso-backend:latest || exit 0']
    id: 'pull-backend-cache'
    waitFor: ['-']
    
  # 2. Pull frontend cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/vciso-frontend:latest || exit 0']
    id: 'pull-frontend-cache'
    waitFor: ['-']
    
  # 3. Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/vciso-backend:latest',
      '--cache-from', 'gcr.io/$PROJECT_ID/vciso-backend:latest',
      './backend'
    ]
    id: 'build-backend'
    waitFor: ['pull-backend-cache']
    
  # 4. Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/vciso-frontend:latest',
      '--cache-from', 'gcr.io/$PROJECT_ID/vciso-frontend:latest',
      './frontend'
    ]
    id: 'build-frontend'
    waitFor: ['pull-frontend-cache']

  # 5. Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vciso-backend:latest']
    id: 'push-backend'
    waitFor: ['build-backend']

  # 6. Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vciso-frontend:latest']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # 7. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vciso-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vciso-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--service-account'
      - 'vciso-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:us-central1:ciso-postgres'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # 8. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vciso-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vciso-frontend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'vciso-frontend-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

  # 9. Build Admin Portal (Static)
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd admin-portal
        npm install
        npm run build
    id: 'build-admin'
    waitFor: ['-']

  # 10. Deploy Admin Portal to Firebase Hosting
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd admin-portal
        npx firebase-tools deploy --project=$PROJECT_ID --only hosting --non-interactive
    id: 'deploy-admin'
    waitFor: ['build-admin']

  # 11. Trigger Success SMS Notification
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r backend/requirements.txt
        python backend/scripts/send_deployment_sms.py "vCISO Automated Cloud Build Deployment completed successfully! All CI/CD pipelines mirror production parity."
    id: 'trigger-sms'
    waitFor: ['deploy-backend', 'deploy-frontend', 'deploy-admin']

images:
  - 'gcr.io/$PROJECT_ID/vciso-backend:latest'
  - 'gcr.io/$PROJECT_ID/vciso-frontend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
