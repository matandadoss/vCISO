steps:
  # Step 1: Run tests (pytest + jest) - Stub implementation
  - name: 'python:3.12'
    entrypoint: 'bash'
    args: ['-c', 'echo "Running Backend Tests..."']
  
  - name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'echo "Running Frontend Tests..."']

  # Step 2: Build Docker images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vciso/backend:${_SHORT_SHA}', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vciso/frontend:${_SHORT_SHA}', './frontend']

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vciso/backend:${_SHORT_SHA}']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vciso/frontend:${_SHORT_SHA}']

  # Step 4: Deploy to Cloud Run (Blue-Green) - Stub implementation
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args: ['-c', 'echo "Deploying to Cloud Run..."']

  # Step 5: Run smoke tests against new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args: ['-c', 'echo "Running smoke tests..."']

  # Step 6: Notify Slack
  - name: 'ubuntu'
    entrypoint: 'bash'
    args: ['-c', 'echo "Notifying Slack for ${_ENV}..."']

substitutions:
  _REGION: us-central1
  _ENV: dev
  _SHORT_SHA: latest
